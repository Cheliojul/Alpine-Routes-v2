<article class="route-card">
  <h3 class="route-card__name">{{ name }}</h3>
  <svg class="elev" viewBox="0 0 240 70" aria-label="Elevation profile from {{ originLabel }} to {{ destLabel }}" role="img">
    <defs>
      <linearGradient id="{{ gradId }}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--color-primary)" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path class="elev-fill" d="{{ fillPath }}" fill="url(#{{ gradId }})"/>
    <path class="elev-line" d="{{ linePath }}" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="28" cy="{{ originY }}" r="3.5" fill="var(--color-accent)"/>
    <circle cx="212" cy="{{ destY }}" r="3.5" fill="var(--color-accent)"/>
    <text x="28" y="{{ originLabelY }}" text-anchor="middle" class="elev-label">{{ originLabel }}</text>
    <text x="212" y="{{ destLabelY }}" text-anchor="middle" class="elev-label">{{ destLabel }}</text>
  </svg>
  <div class="route-card__meta">
    <span class="route-card__duration">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      {{ duration }}
    </span>
    <span class="route-card__price">from <span class="route-card__price-num">{{ price }}</span></span>
  </div>
  <a href="#book" class="route-card__cta btn-secondary" aria-label="Reserve {{ reserve }} transfer">Reserve →</a>
</article>
